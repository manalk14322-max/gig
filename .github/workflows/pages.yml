name: Deploy UniHire to GitHub Pages

on:
  push:
    branches: ['main']
    paths:
      - 'gig-system/client/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gig-system/client/package-lock.json

      - name: Install
        working-directory: gig-system/client
        run: npm ci

      - name: Build
        working-directory: gig-system/client
        env:
          VITE_API_URL: https://gig-ruby.vercel.app/api
        run: npm run build

      - name: Add SPA fallback
        working-directory: gig-system/client
        run: |
          cp dist/index.html dist/404.html
          for route in profile create dashboard orders messages wallet settings favorites buyer admin/verification admin/database; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gig-system/client/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
